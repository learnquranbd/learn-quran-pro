<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light" class="overflow-x-hidden">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Quran - Multi-Language Quran Reader</title>
  <meta name="description" content="Multi-language Quran reader with Tafseer, Word by Word, Grammar, Audio and Video lectures">
  <meta name="keywords" content="Quran, Tafseer, Arabic Grammar, Word by Word, Islamic Education">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1e40af">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            'arabic': ['Amiri', 'Traditional Arabic', 'serif'],
            'bengali': ['Kalpurush', 'SolaimanLipi', 'sans-serif'],
          },
          colors: {
            primary: '#1e40af',
            secondary: '#059669',
            accent: '#d97706',
          }
        }
      }
    }
  </script>

  <!-- Google Fonts for Arabic -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300 overflow-x-hidden">

          <!-- Quick Actions: language selector + gear (font/theme moved to gear drawer) -->

              <option value="ms">Bahasa Melayu</option>
              <option value="tr">Türkçe (Turkish)</option>
              <option value="hi">हिन्दी (Hindi)</option>
              <option value="fr">Français (French)</option>
              <option value="es">Español (Spanish)</option>
              <option value="de">Deutsch (German)</option>
              <option value="ru">Русский (Russian)</option>
              <option value="ja">日本語 (Japanese)</option>

    <div class="flex flex-1 lg:items-start">

  <!-- Go to top -->
  <button id="go-top" title="Go to top" aria-label="Go to top"
          class="fixed bottom-6 right-6 z-40 hidden w-11 h-11 rounded-full bg-primary text-white shadow-lg hover:bg-primary/90 items-center justify-center">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
    </svg>
  </button>
  <script>
    (function () {
      var btn = document.getElementById('go-top');
      if (!btn) return;
      function toggle() {
        var down = (window.scrollY || document.documentElement.scrollTop) > 400;
        btn.classList.toggle('hidden', !down);
        btn.classList.toggle('flex', down);
      }
      window.addEventListener('scroll', toggle, { passive: true });
      btn.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });
      toggle();
    })();
  </script>

  <script>
    // Site title: translate to current language and hard-refresh on click.
    (function () {
      var el = document.getElementById('site-title');
      if (!el) return;
      var TITLES = {
        en: 'Learn Quran', bn: 'কুরআন শিখুন', ar: 'تعلّم القرآن',
        ur: 'قرآن سیکھیں', fa: 'قرآن بیاموز', id: 'Belajar Al-Quran',
        ms: 'Belajar Al-Quran', tr: "Kur'an Öğren", hi: 'क़ुरआन सीखें',
        fr: 'Apprendre le Coran', es: 'Aprender el Corán', de: 'Koran lernen',
        ru: 'Изучаем Коран', ja: 'クルアーンを学ぶ', zh: '学习古兰经'
      };
      function apply(lang) { el.textContent = TITLES[lang] || TITLES.en; }
      var lang = (typeof appSettings !== 'undefined' && appSettings)
        ? appSettings.get('language') : 'en';
      apply(lang);
      window.addEventListener('settingChanged', function (e) {
        if (e && e.detail && e.detail.key === 'language') apply(e.detail.value);
      });
      el.addEventListener('click', function (ev) {
        ev.preventDefault();
        location.reload();
      });
    })();
  </script>
