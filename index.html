<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Quran - Multi-Language Quran Reader</title>
  <meta name="description" content="Multi-language Quran reader with Tafseer, Word by Word, Grammar, Audio and Video lectures">
  <meta name="keywords" content="Quran, Tafseer, Arabic Grammar, Word by Word, Islamic Education">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1e40af">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            'arabic': ['Amiri', 'Traditional Arabic', 'serif'],
            'bengali': ['Kalpurush', 'SolaimanLipi', 'sans-serif'],
          },
          colors: {
            primary: '#1e40af',
            secondary: '#059669',
            accent: '#d97706',
          }
        }
      }
    }
  </script>

  <!-- Google Fonts for Arabic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css?v=28">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

  <div id="app" class="min-h-screen flex flex-col">

    <!-- Header Section -->
    <header class="bg-primary dark:bg-gray-800 text-white shadow-lg sticky top-0 z-50">
      <div class="w-full px-4 py-3">
        <div class="flex flex-wrap items-center justify-between gap-4">

          <!-- Logo/Brand -->
          <div class="flex items-center gap-2">
            <button id="sidebar-toggle" class="lg:hidden p-2 hover:bg-white/10 rounded-lg">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
              </svg>
            </button>
            <h1 class="text-xl font-bold">Learn Quran</h1>
          </div>

          <!-- Surah Selection -->
          <div class="flex flex-wrap items-center gap-2 flex-1 max-w-2xl">
            <select id="surah-select" class="surah-dropdown flex-1 min-w-[200px] px-4 py-2 rounded-lg bg-gray-700 dark:bg-gray-900 border border-gray-600 dark:border-gray-700 text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="" data-lang-key="select_surah">Select Surah</option>
            </select>

            <input type="text" id="ayah-range"
              class="flex-1 min-w-[150px] px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-white/50"
              placeholder="2:255, 18:1-10" title="2:255, 18:1-10, 67:1-30">

            <button id="load-btn" class="px-6 py-2 bg-secondary hover:bg-secondary/80 rounded-lg font-medium transition-colors">
              <span data-lang-key="load">Load</span>
            </button>
          </div>

          <!-- Quick Actions: language / font size / theme grouped top-right -->
          <div class="flex items-center gap-1 bg-white/10 rounded-lg px-2 py-1">
            <select id="language-select" class="px-2 py-1 text-sm rounded-md bg-transparent text-white border-0 focus:outline-none focus:ring-2 focus:ring-white/50 [&>option]:text-gray-900">
              <option value="en">English</option>
              <option value="ar">العربية (Arabic)</option>
              <option value="bn">বাংলা (Bengali)</option>
              <option value="ur">اردو (Urdu)</option>
              <option value="fa">فارسی (Persian)</option>
              <option value="id">Indonesia</option>
              <option value="ms">Bahasa Melayu</option>
              <option value="tr">Türkçe (Turkish)</option>
              <option value="hi">हिन्दी (Hindi)</option>
              <option value="fr">Français (French)</option>
              <option value="es">Español (Spanish)</option>
              <option value="de">Deutsch (German)</option>
              <option value="ru">Русский (Russian)</option>
              <option value="ja">日本語 (Japanese)</option>
              <option value="zh">简体中文 (Chinese)</option>
            </select>
            <span class="w-px h-5 bg-white/20"></span>
            <button id="font-decrease" class="px-2 py-1 text-sm rounded-md hover:bg-white/10">A-</button>
            <span id="font-size-display" class="px-1 text-xs text-white/80">100%</span>
            <button id="font-increase" class="px-2 py-1 text-sm rounded-md hover:bg-white/10">A+</button>
            <span class="w-px h-5 bg-white/20"></span>
            <select id="theme-select" class="px-2 py-1 text-sm rounded-md bg-transparent text-white border-0 focus:outline-none focus:ring-2 focus:ring-white/50 [&>option]:text-gray-900">
              <option value="light" data-lang-key="light">Light</option>
              <option value="dark" data-lang-key="dark">Dark</option>
              <option value="system" data-lang-key="system">System</option>
            </select>
            <button id="theme-toggle" class="p-2 hover:bg-white/10 rounded-lg" title="Toggle Theme">
              <svg class="w-6 h-6 hidden dark:block" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
              </svg>
              <svg class="w-6 h-6 block dark:hidden" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden min-h-0">

      <!-- Sidebar -->
      <aside id="sidebar" class="w-64 bg-white dark:bg-gray-800 shadow-lg transform -translate-x-full lg:translate-x-0 fixed lg:static inset-y-0 left-0 z-40 transition-transform duration-300 overflow-y-auto min-h-0 lg:h-full">
        <div class="p-4">
          <!-- Drill-down module nav (js/app-nav.js): a primary list (Subject, Learn,
               Memorize, Quiz, Audio, Mushaf); clicking a primary with children swaps
               the sidebar to that child list with a back arrow. -->
          <nav id="app-nav" class="mb-3 space-y-1"></nav>

          <!-- Full old-app subject menu tree, rendered by js/sidebar-menu.js (LEGACY_MENU).
               Wrapped so app-nav can show it only when "Quranic Ayah by Subject" is opened.
               The module adds body.legacy-sidebar so the old AdminLTE-style theme
               in css/style.css (.nav-group / .nav-group-parent hooks) applies. -->
          <div id="legacy-menu-wrap" class="hidden">
            <button id="legacy-menu-back" class="w-full flex items-center gap-2 px-3 py-2 mb-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
              <span class="text-lg leading-none">←</span><span data-lang-key="back">Back</span>
            </button>
            <nav id="legacy-menu" class="space-y-1"></nav>
          </div>

          <hr class="my-4 border-gray-200 dark:border-gray-700">

          <h3 class="text-sm font-semibold mb-2 text-gray-500 dark:text-gray-400" data-lang-key="quick_navigation">Quick Navigation</h3>
          <div id="juz-list" class="space-y-1 text-sm">
            <!-- Juz list will be populated dynamically -->
          </div>
        </div>
      </aside>

      <!-- Sidebar Overlay -->
      <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 lg:hidden hidden"></div>

      <!-- Main Content -->
      <main class="flex-1 overflow-y-auto min-h-0">
        <div class="w-full px-4 py-6">

          <!-- Tabs Navigation -->
          <div class="border-b border-gray-200 dark:border-gray-700 mb-6">
            <nav class="flex flex-wrap gap-2 -mb-px" id="tabs-nav">
              <button class="tab-btn active px-4 py-3 text-sm font-medium border-b-2 border-primary text-primary dark:text-blue-400 dark:border-blue-400" data-tab="reading">
                <span data-lang-key="ayah_reading">Ayah Reading</span>
              </button>
              <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200" data-tab="search">
                <span data-lang-key="search">Search</span>
              </button>
              <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200" data-tab="tafseer">
                <span data-lang-key="tafseers">Tafseers</span>
              </button>
              <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200" data-tab="wordbyword">
                <span data-lang-key="word_by_word">Word by Word</span>
              </button>
              <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200" data-tab="grammar">
                <span data-lang-key="grammar">Grammar</span>
              </button>
              <!-- Learn / Memorize / Quiz / Audio / Mushaf now live in the left sidebar
                   drill-down nav (js/app-nav.js); their panels below are switched from there. -->
            </nav>
          </div>

          <!-- Tab Content Panels -->
          <div id="tab-content">

            <!-- Reading Tab -->
            <div id="tab-reading" class="tab-panel active">
              <div id="ayah-container" class="space-y-6"></div>
            </div>

            <!-- Search Tab (Arabic phrase / word-block repetition search) -->
            <div id="tab-search" class="tab-panel hidden">
              <div id="search-container"></div>
            </div>

            <!-- Tafseer Tab -->
            <div id="tab-tafseer" class="tab-panel hidden">
              <div id="tafseer-container" class="space-y-6">
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                  <h3 class="text-lg font-semibold mb-4" data-lang-key="select_tafseer">Select Tafseer Source</h3>
                  <select id="tafseer-source" class="w-full px-4 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
                    <option value="ibn-kathir">Ibn Kathir</option>
                    <option value="jalalayn">Tafsir al-Jalalayn</option>
                    <option value="maariful">Ma'ariful Quran</option>
                    <option value="bengali">Bengali Tafseer</option>
                  </select>
                </div>
                <div id="tafseer-content" class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                  <p class="text-gray-500 dark:text-gray-400" data-lang-key="load_ayah_first">Load ayahs first to view tafseer</p>
                </div>
              </div>
            </div>

            <!-- Word by Word Tab -->
            <div id="tab-wordbyword" class="tab-panel hidden">
              <div id="wbw-container" class="space-y-6">
                <p class="text-gray-500 dark:text-gray-400 text-center py-12" data-lang-key="load_ayah_first">Load ayahs first to view word by word translation</p>
              </div>
            </div>

            <!-- Grammar Tab -->
            <div id="tab-grammar" class="tab-panel hidden">
              <div id="grammar-container" class="space-y-6">
                <p class="text-gray-500 dark:text-gray-400 text-center py-12" data-lang-key="load_ayah_first">Load ayahs first to view grammar analysis</p>
              </div>
            </div>

            <!-- Learn Tab -->
            <div id="tab-learn" class="tab-panel hidden">
              <div id="learn-back" class="hidden mb-4">
                <button class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm">← Back</button>
              </div>
              <div id="learn-hub"></div>
              <div id="learn-kids-root" class="hidden"></div>
              <div id="learn-vocab-root" class="hidden"></div>
              <div id="learn-names-root" class="hidden"></div>
              <div id="handwriting-root" class="hidden"></div>
            </div>

            <!-- Memorize Tab (Speech checker | Typing recall) -->
            <div id="tab-memorize" class="tab-panel hidden">
              <div id="memorize-modes" class="flex flex-wrap gap-2 mb-5">
                <button data-mmode="speech" class="mmode-btn active px-4 py-2 rounded-lg text-sm font-medium bg-primary text-white shadow">
                  🎙️ <span data-lang-key="mem_mode_speech">Speech</span>
                </button>
                <button data-mmode="typing" class="mmode-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600">
                  ⌨️ <span data-lang-key="mem_mode_typing">Typing</span>
                </button>
                <button data-mmode="arrange" class="mmode-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600">
                  🔀 <span data-lang-key="mem_mode_arrange">Arrange</span>
                </button>
              </div>
              <div id="memorize-container" class="space-y-6"></div>
              <div id="type-memorize-root" class="hidden"></div>
              <div id="word-arrange-root" class="hidden"></div>
            </div>

            <!-- Quiz Tab -->
            <div id="tab-quiz" class="tab-panel hidden">
              <div id="quiz-container"></div>
            </div>

            <!-- Audio Tab -->
            <div id="tab-audio" class="tab-panel hidden">
              <div id="audio-container" class="space-y-6">
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                  <h3 class="text-lg font-semibold mb-4" data-lang-key="select_reciter">Select Reciter</h3>
                  <select id="reciter-select" class="w-full px-4 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
                    <option value="mishary">Mishary Rashid Alafasy</option>
                    <option value="sudais">Abdul Rahman Al-Sudais</option>
                    <option value="minshawi">Mohamed Siddiq El-Minshawi</option>
                    <option value="husary">Mahmoud Khalil Al-Husary</option>
                  </select>
                </div>
                <div id="audio-player" class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                  <div class="flex items-center justify-center gap-4">
                    <button id="audio-prev" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full">
                      <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M8.445 14.832A1 1 0 0010 14v-2.798l5.445 3.63A1 1 0 0017 14V6a1 1 0 00-1.555-.832L10 8.798V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z"/>
                      </svg>
                    </button>
                    <button id="audio-play" class="p-4 bg-primary text-white rounded-full hover:bg-primary/80">
                      <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
                      </svg>
                    </button>
                    <button id="audio-next" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full">
                      <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M4.555 5.168A1 1 0 003 6v8a1 1 0 001.555.832L10 11.202V14a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4A1 1 0 0010 6v2.798l-5.445-3.63z"/>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Mushaf Tab -->
            <div id="tab-mushaf" class="tab-panel hidden">
              <div id="mushaf-container" class="space-y-6"></div>
            </div>

            <!-- Topics Tab (A–Z topical index → verses) -->
            <div id="tab-topics" class="tab-panel hidden">
              <div id="topics-container"></div>
            </div>

            <!-- Word Repetition Tab (exact | root, per surah/ayah) -->
            <div id="tab-wordrepeat" class="tab-panel hidden">
              <div id="wordrepeat-container"></div>
            </div>

            <!-- Sarf Tab (morphology paradigm charts for frequent roots) -->
            <div id="tab-sarf" class="tab-panel hidden">
              <div id="sarf-container"></div>
            </div>

          </div>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-4 sticky bottom-0 z-40">
      <div class="w-full px-4">
        <div class="flex flex-wrap items-center justify-center gap-x-4 gap-y-1 text-center text-sm text-gray-500 dark:text-gray-400">
          <span>&copy; 2024 Learn Quran BD</span>
          <a href="https://learn-quran-bd.web.app" target="_blank" rel="noopener"
             class="inline-flex items-center gap-1 text-primary dark:text-blue-400 hover:underline">
            🇧🇩 <span data-lang-key="bangla_site_link">বাংলা সাইট — learn-quran-bd.web.app</span>
          </a>
        </div>
      </div>
    </footer>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-8 flex flex-col items-center">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-primary border-t-transparent"></div>
      <p class="mt-4 text-gray-600 dark:text-gray-300" data-lang-key="loading">Loading...</p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/surah-data.js?v=28"></script>
  <script src="js/translations.js?v=28"></script>
  <script src="js/quran-data.js?v=28"></script>
  <script src="js/tabs.js?v=28"></script>
  <script src="js/settings.js?v=28"></script>
  <script src="js/wordbyword.js?v=28"></script>
  <script src="js/grammar.js?v=28"></script>
  <script src="js/memorize.js?v=28"></script>
  <script src="js/quiz-center.js?v=28"></script>
  <script src="js/word-highlight.js?v=28"></script>
  <script src="js/audio.js?v=28"></script>
  <script src="js/tafseer.js?v=28"></script>
  <script src="js/tajweed.js?v=28"></script>
  <script src="js/qaida-data.js?v=28"></script>
  <script src="js/learn-kids.js?v=28"></script>
  <script src="js/vocab-data.js?v=28"></script>
  <script src="js/learn-vocab.js?v=28"></script>
  <script src="js/names-data.js?v=28"></script>
  <script src="js/learn-names.js?v=28"></script>
  <script src="js/learn.js?v=28"></script>
  <script src="js/handwriting.js?v=28"></script>
  <script src="js/type-memorize.js?v=28"></script>
  <script src="js/word-arrange.js?v=28"></script>
  <script src="js/menu-data.js?v=28"></script>
  <script src="js/legacy-surah-data.js?v=28"></script>
  <script src="js/sidebar-menu.js?v=28"></script>
  <script src="js/app-nav.js?v=28"></script>
  <script src="js/topics-browser.js?v=28"></script>
  <script src="js/word-repeat.js?v=28"></script>
  <script src="js/sarf.js?v=28"></script>
  <script src="js/topics-data.js?v=28"></script>
  <script src="js/navigation.js?v=28"></script>
  <script src="js/legacy-ayah.js?v=28"></script>
  <script src="js/settings-drawer.js?v=28"></script>
  <script src="js/firebase-config.js?v=28"></script>
  <script src="js/account.js?v=28"></script>
  <script src="js/ponder.js?v=28"></script>
  <script src="js/mushaf.js?v=28"></script>
  <script src="js/pwa.js?v=28"></script>
  <script src="js/search.js?v=28"></script>
  <script src="js/subscribe.js?v=28"></script>
  <script src="js/bookmarks.js?v=28"></script>
  <script src="js/app.js?v=28"></script>
</body>
</html>
